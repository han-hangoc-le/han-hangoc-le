name: generate monkeytype readme svg

on:
    schedule:
        - cron: "0 */6 * * *" # every 6 hours
    workflow_dispatch:

permissions:
  contents: write

jobs:
    download-svg:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Download SVG
              run: |
                  mkdir public
                  curl -o public/monkeytype-readme-pb.svg "https://monkeytype-readme.zeabur.app/generate-svg/EVA-01/nord?pb=true"

            - name: push monkeytype-readme.svg to the monkeytype-readme branch
              uses: crazy-max/ghaction-github-pages@v4.0.0
              with:
                  target_branch: monkeytype-readme
                  build_dir: public
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
